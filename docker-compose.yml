# docker-compose.yml

services:

  documind-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: documind-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data       # Persist ChromaDB across restarts
      - ./backend/models:/app/models   # Persist downloaded embedding models
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3.2:3b
      - EMBEDDING_DEVICE=cpu   # No MPS in Docker — CPU for embedding
      - PYTHONPATH=/app
      - LOG_LEVEL=INFO
    # This allows the container to reach the macOS host's Ollama
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8000/api/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  documind-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: documind-ui
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      # Points the Vite server-side proxy to the backend container via Docker DNS.
      # The browser always calls /api/v1 on the same origin (port 8501);
      # Vite forwards those requests to documind-api:8000 inside Docker's network.
      - API_PROXY_TARGET=http://documind-api:8000
    depends_on:
      documind-api:
        condition: service_healthy

networks:
  default:
    name: documind-network
