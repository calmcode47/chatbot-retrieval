server {
    listen 8501;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/v1 requests to the backend service
    # BACKEND_URL is substituted at container startup by entrypoint.sh
    location /api/v1/ {
        proxy_pass BACKEND_URL_PLACEHOLDER/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 30s;
    }

    # Serve React SPA — fallback all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
