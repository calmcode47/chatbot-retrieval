# Use Docker/Railway's built-in DNS resolver so Nginx re-resolves
# the upstream hostname on every request instead of caching the IP
# at startup. This prevents 504 timeouts after backend redeploys.
resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen PORT_PLACEHOLDER;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/v1 requests to the backend service.
    # BACKEND_URL_PLACEHOLDER is replaced at runtime by entrypoint.sh.
    # We store it in a variable so Nginx uses the resolver on each request.
    location /api/v1/ {
        set $backend "BACKEND_URL_PLACEHOLDER";
        proxy_pass $backend/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
        proxy_buffer_size          128k;
        proxy_buffers              4 256k;
        proxy_busy_buffers_size    256k;
    }

    # Serve React SPA — fallback all routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint
    location /health {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
